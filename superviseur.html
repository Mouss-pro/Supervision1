<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Superviseur</title>
<link id="pwa-manifest-link" rel="manifest">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Superviseur">
<link id="pwa-icon-link" rel="apple-touch-icon">
<link id="favicon-link" rel="icon" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;
  --surface:#111318;
  --card:#161a22;
  --border:#1e2330;
  --border2:#252d3d;
  --text:#e8eaf0;
  --muted:#6b7594;
  --muted2:#8d97b5;
  --gold:#d4a843;
  --gold2:#f0c866;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#3b82f6;
  --purple:#a855f7;
  --accent:#d4a843;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(212,168,67,.08),transparent)}

/* ── LOGIN ── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.login-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  padding:40px 36px;max-width:400px;width:100%;
  box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 0 1px rgba(212,168,67,.08);
  position:relative;overflow:hidden;
}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon{font-size:42px;display:block;margin-bottom:10px}
.login-logo h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);letter-spacing:.02em}
.login-logo p{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px;font-weight:500}
.field input,.field textarea{
  width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text)!important;
  -webkit-text-fill-color:var(--text)!important;border-radius:10px;padding:12px 14px;
  font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;
}
.field input::placeholder{color:var(--muted)!important;-webkit-text-fill-color:var(--muted)!important}
.field input:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:140px;font-size:12px;line-height:1.7}
.btn-gold{
  width:100%;background:var(--gold);color:#0a0c10;border:none;border-radius:10px;
  padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.02em;
}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(212,168,67,.3)}
.err-msg{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;
  border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}

/* ── DASHBOARD ── */
#dashboard{display:none;min-height:100vh;flex-direction:column}

header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-brand{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold)}
.header-brand span{font-size:12px;color:var(--muted);display:block;font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:.06em}
.btn-logout{background:var(--card);border:1px solid var(--border2);color:var(--muted2);padding:7px 14px;
  border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.btn-save{background:var(--gold);color:#0a0c10;border:none;border-radius:8px;padding:7px 16px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-save:hover{background:var(--gold2)}
@media print{
  #loginScreen{display:none!important}
  header{position:relative!important}
  .btn-save,.btn-logout,.code-zone,#sessionsZone{display:none!important}
  body{background:#fff!important;color:#000!important}
  .rapport-header,.section{border:1px solid #ddd!important;background:#fff!important;color:#000!important}
  .rapport-title,.section-title{color:#000!important}
  .kpi-box{background:#f5f5f5!important;border:1px solid #ddd!important}
  .kv,.kn,.bar-label,.bar-val{color:#000!important}
  .tbl th,.tbl td{color:#000!important;border-color:#ddd!important}
  .stock-pill{background:#f5f5f5!important;border:1px solid #ddd!important;color:#000!important}
}

.main-content{flex:1;padding:24px;max-width:900px;margin:0 auto;width:100%}

/* ── CODE INPUT ZONE ── */
.code-zone{
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;
  margin-bottom:28px;position:relative;overflow:hidden;
}
.code-zone::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.code-zone h2{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);margin-bottom:16px}
.code-input-row{display:flex;gap:10px;align-items:flex-start}
.code-input-row textarea{
  flex:1;background:var(--card);border:1px solid var(--border2);color:var(--text)!important;
  -webkit-text-fill-color:var(--text)!important;border-radius:10px;padding:12px 14px;
  font-family:'Space Mono',monospace;font-size:11px;outline:none;transition:border-color .2s;
  resize:vertical;min-height:72px;line-height:1.6;
}
.code-input-row textarea:focus{border-color:var(--gold)}
.code-input-row textarea::placeholder{color:var(--muted)!important;-webkit-text-fill-color:var(--muted)!important}
.btn-decode{background:var(--gold);color:#0a0c10;border:none;border-radius:10px;padding:12px 20px;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:all .2s;align-self:flex-end}
.btn-decode:hover{background:var(--gold2)}

/* ── SESSIONS ── */
.sessions-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;font-weight:500}
.session-list{display:flex;flex-direction:column;gap:8px}
.session-chip{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;cursor:pointer;transition:all .2s;
}
.session-chip:hover,.session-chip.active{border-color:var(--gold);background:rgba(212,168,67,.06)}
.session-chip .chip-date{font-weight:700;font-size:13px;flex:1}
.session-chip .chip-ca{font-family:'Space Mono',monospace;font-size:13px;color:var(--green)}
.session-chip .chip-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:color .15s}
.session-chip .chip-del:hover{color:var(--red)}

/* ── RAPPORT ── */
#rapportView{display:none}
.rapport-header{
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  padding:24px;margin-bottom:20px;position:relative;overflow:hidden;
}
.rapport-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--purple),var(--gold))}
.rapport-meta{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.rapport-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold)}
.rapport-sub{font-size:12px;color:var(--muted);margin-top:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.kpi-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.kpi-box .kv{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
.kpi-box .kn{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}

.section{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:20px;margin-bottom:16px;overflow:hidden}
.section-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold2);
  margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* bar chart */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:13px;min-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:var(--card);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-val{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2);min-width:90px;text-align:right}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
  padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.num{font-family:'Space Mono',monospace}

.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge-paid{background:rgba(34,197,94,.15);color:var(--green)}
.badge-unpaid{background:rgba(239,68,68,.15);color:var(--red)}

.stock-grid{display:flex;flex-wrap:wrap;gap:7px}
.stock-pill{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:6px 12px;font-size:12px;display:flex;gap:6px;align-items:center}
.stock-pill strong{font-family:'Space Mono',monospace}

.empty{color:var(--muted);font-size:13px;padding:12px 0;font-style:italic}

/* ── PERIODE ── */
.periode-zone{
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:20px;
  margin-bottom:28px;position:relative;overflow:hidden;
}
.periode-zone::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.periode-zone h2{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);margin-bottom:14px}
.periode-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.periode-field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px}
.periode-field label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500}
.periode-field input[type=date]{
  background:var(--card);border:1px solid var(--border2);color:var(--text);
  border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s;width:100%;
  color-scheme:dark;
}
.periode-field input[type=date]:focus{border-color:var(--purple)}
.btn-periode{background:var(--purple);color:#fff;border:none;border-radius:10px;
  padding:11px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:all .2s;align-self:flex-end}
.btn-periode:hover{background:#c026d3}
.periode-info{font-size:12px;color:var(--muted);margin-top:10px}
.periode-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.periode-chip-btn{background:var(--card);border:1px solid var(--border2);color:var(--muted2);
  padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.periode-chip-btn:hover{border-color:var(--purple);color:var(--purple)}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-weight:700;
  font-size:14px;z-index:9999;transition:transform .3s;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── BUVETTES TABS ── */
.buvettes-bar{
  background:var(--surface);border-bottom:1px solid var(--border2);
  padding:0 16px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;
  flex-shrink:0;
}
.buvettes-bar::-webkit-scrollbar{display:none}
.buvette-tab{
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:10px 14px;border-radius:8px 8px 0 0;cursor:pointer;
  color:var(--muted2);border:1px solid transparent;border-bottom:none;
  white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px;
  position:relative;top:1px;
}
.buvette-tab:hover{color:var(--text);background:var(--card)}
.buvette-tab.active{
  color:var(--gold);background:var(--card);
  border-color:var(--border2);border-bottom-color:var(--card);
}
.buvette-tab .tab-badge{
  font-size:10px;background:var(--border2);color:var(--muted2);
  padding:1px 6px;border-radius:10px;font-family:'Space Mono',monospace;
}
.buvette-tab.active .tab-badge{background:var(--gold-dim,rgba(212,168,67,.15));color:var(--gold)}
.buvette-tab .tab-edit{
  font-size:13px;color:var(--muted);padding:2px 3px;border-radius:5px;line-height:1;
  transition:color .2s,background .2s;
}
.buvette-tab .tab-edit:hover,.buvette-tab .tab-edit:active{color:var(--gold);background:rgba(212,168,67,.12)}
.btn-add-buvette{
  font-size:18px;padding:6px 10px;cursor:pointer;color:var(--muted);
  background:none;border:none;transition:color .2s;flex-shrink:0;
}
.btn-add-buvette:hover{color:var(--gold)}
.buvette-all-tab{
  font-size:12px;font-weight:700;padding:10px 14px;
  border-radius:8px 8px 0 0;cursor:pointer;
  color:var(--muted2);border:1px solid transparent;border-bottom:none;
  white-space:nowrap;transition:all .2s;position:relative;top:1px;
}
.buvette-all-tab.active{color:var(--purple,#a855f7);background:var(--card);border-color:var(--border2);border-bottom-color:var(--card)}

/* ── MODAL BUVETTE ── */
.buvette-modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);
}
.buvette-modal-overlay.open{display:flex}
.buvette-modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px 20px 0 0;padding:20px 18px 32px;
  width:100%;max-width:500px;
}
.buvette-modal h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);margin-bottom:14px}
.buvette-modal input{
  width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);
  border-radius:10px;padding:12px 14px;font-size:14px;outline:none;margin-bottom:12px;
  font-family:'DM Sans',sans-serif;
}
.buvette-modal input:focus{border-color:var(--gold)}
.buvette-modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-modal-confirm{background:var(--gold);color:#000;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-modal-cancel{background:none;border:1px solid var(--border2);color:var(--muted2);border-radius:10px;padding:12px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-modal-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;margin-top:8px}

/* responsive */
@media(max-width:600px){
  .main-content{padding:16px}
  .rapport-meta{flex-direction:column}
  .code-input-row{flex-direction:column}
  .btn-decode{width:100%}
}
</style>
</head>
<body>

<div id="toast"></div>


<!-- ═══ DASHBOARD ═══ -->
<div id="dashboard" style="display:flex;flex-direction:column;min-height:100vh">
  <header>
    <div class="header-brand">
      🏢 Supervision DG
      <span>Tableau de bord — Direction</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-save" id="btnSave" onclick="sauvegarderRapport()" style="display:none">💾 Sauvegarder</button>
      <button class="btn-save" id="btnPrint" onclick="window.print()" style="display:none;background:var(--purple)">🖨️ Imprimer</button>
    </div>
  </header>

  <!-- BUVETTES TABS -->
  <div class="buvettes-bar" id="buvettesTabs">
    <!-- généré dynamiquement -->
  </div>

  <div class="main-content">

    <!-- Zone saisie code -->
    <div class="code-zone">
      <h2>📥 Importer un rapport journalier</h2>
      <div class="code-input-row">
        <textarea id="codeInput" placeholder="Collez ici le code du rapport transmis par le responsable de la buvette…"></textarea>
        <button class="btn-decode" onclick="importerCode()">Décoder ▶</button>
      </div>
      <div class="err-msg" id="codeErr" style="margin-top:10px">Code invalide ou corrompu.</div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:10px">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">ou</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <div style="margin-top:14px;text-align:center">
        <label id="importLabel" style="display:inline-flex;align-items:center;gap:10px;background:var(--card);border:2px dashed var(--border2);color:var(--muted2);padding:14px 28px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--muted2)'">
          <span style="font-size:20px">📂</span>
          <span>Importer un rapport <code style="background:var(--border);padding:2px 6px;border-radius:4px;font-size:12px">.txt</code></span>
          <input type="file" accept=".txt" style="display:none" onchange="importerFichierJSON(event)">
        </label>
      </div>
    </div>

    <!-- ── SAUVEGARDE GLOBALE ── -->
    <div id="backupZone" style="display:none;background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:20px">
      <div style="font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);margin-bottom:12px">💾 Sauvegarde des données</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button onclick="exporterSessions()" style="display:flex;align-items:center;justify-content:center;gap:8px;background:var(--gold);color:#000;border:none;border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer">
          📤 Exporter toutes les données
        </button>
        <label style="display:flex;align-items:center;justify-content:center;gap:8px;background:var(--card2);border:1px solid var(--border2);color:var(--muted2);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer">
          📥 Restaurer une sauvegarde
          <input type="file" accept=".txt" style="display:none" onchange="importerSauvegarde(event)">
        </label>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">
        💡 Exportez avant chaque mise à jour pour ne perdre aucune donnée
      </div>
    </div>

    <!-- Sessions enregistrées -->
    <div id="sessionsZone" style="display:none;margin-bottom:28px">
      <div class="sessions-title">📅 Rapports reçus</div>
      <div class="session-list" id="sessionList"></div>
    </div>

    <!-- Rapport sur plage de dates -->
    <div id="periodeZone" style="display:none" class="periode-zone">
      <h2>📆 Rapport sur une période</h2>
      <div class="periode-chips">
        <button class="periode-chip-btn" onclick="raccourciPeriode(7)">7 derniers jours</button>
        <button class="periode-chip-btn" onclick="raccourciPeriode(15)">15 jours</button>
        <button class="periode-chip-btn" onclick="raccourciPeriode(30)">30 jours</button>
        <button class="periode-chip-btn" onclick="raccourciPeriodeMois()">Ce mois-ci</button>
      </div>
      <div class="periode-row" style="margin-top:12px">
        <div class="periode-field">
          <label>Du</label>
          <input type="date" id="dateDebut">
        </div>
        <div class="periode-field">
          <label>Au</label>
          <input type="date" id="dateFin">
        </div>
        <button class="btn-periode" onclick="genererRapportPeriode()">Générer ▶</button>
      </div>
      <div class="periode-info" id="periodeInfo"></div>
    </div>

    <!-- Vue rapport -->
    <div id="rapportView"></div>

  </div>
</div>

<script>
// ─── CONFIG ───
const DG_SESSIONS_KEY = 'buvette_dg_sessions';

// Stockage robuste : essaie localStorage, fallback sessionStorage, fallback mémoire
const _store = {};
function storeSet(key, val){
  try { localStorage.setItem(key, val); return; } catch(e){}
  try { sessionStorage.setItem(key, val); return; } catch(e){}
  _store[key] = val;
}
function storeGet(key){
  try { const v = localStorage.getItem(key); if(v!==null) return v; } catch(e){}
  try { const v = sessionStorage.getItem(key); if(v!==null) return v; } catch(e){}
  return _store[key]||null;
}
function storeDel(key){
  try { localStorage.removeItem(key); } catch(e){}
  try { sessionStorage.removeItem(key); } catch(e){}
  delete _store[key];
}

// ─── UTILS ───
let toastTmr;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=type==='err'?'#ef4444':type==='warn'?'#f59e0b':'#22c55e';
  el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('show'),2800);
}
function fmtDate(d){
  try{ return new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
  catch(e){ return d; }
}
const fcfa = v => new Intl.NumberFormat('fr-FR').format(Math.round(v))+' FCFA';

// Chargement direct sans mot de passe
document.addEventListener('DOMContentLoaded', function(){ renderSessions(); });
setTimeout(function(){ renderSessions(); }, 300);

// ─── BUVETTES MULTI ───
const DG_BUVETTES_KEY = 'buvette_dg_buvettes';
let activeBuvetteId = 'all';

function getBuvettes(){ try{ return JSON.parse(storeGet(DG_BUVETTES_KEY)||'[]'); } catch(e){ return []; } }
function saveBuvettes(b){ storeSet(DG_BUVETTES_KEY, JSON.stringify(b)); }
function sessionKeyFor(id){ return 'buvette_sessions_'+id; }

function getSessions(buvetteId){
  if(buvetteId && buvetteId!=='all'){
    try{ return JSON.parse(storeGet(sessionKeyFor(buvetteId))||'[]'); } catch(e){ return []; }
  }
  const buvettes = getBuvettes();
  let all = [];
  buvettes.forEach(b=>{
    const s = getSessions(b.id).map(sess=>({...sess,_buvetteId:b.id,_buvetteNom:b.nom}));
    all = all.concat(s);
  });
  // Migration ancien système
  try{
    const legacy = JSON.parse(storeGet(DG_SESSIONS_KEY)||'[]');
    legacy.forEach(s=>{ s._buvetteNom=s.nomBuvette||'Buvette'; });
    all = all.concat(legacy);
  }catch(e){}
  return all;
}
function saveSessionsFor(buvetteId, sessions){ storeSet(sessionKeyFor(buvetteId), JSON.stringify(sessions)); }
function getSessions_active(){ return getSessions(activeBuvetteId==='all'?null:activeBuvetteId); }

function getBuvetteIdByNom(nom){
  let buvettes = getBuvettes();
  let b = buvettes.find(x=>x.nom.toLowerCase()===nom.toLowerCase());
  if(!b){ b={id:'bv_'+Date.now(),nom}; buvettes.push(b); saveBuvettes(buvettes); }
  return b.id;
}

// ─── TABS ───
function renderBuvetteTabs(){
  const buvettes = getBuvettes();
  const bar = document.getElementById('buvettesTabs');
  if(!bar) return;
  let html = '';
  if(buvettes.length > 1){
    const total = getSessions(null).length;
    html += `<div class="buvette-all-tab ${activeBuvetteId==='all'?'active':''}" onclick="setActiveBuvette('all')">🏢 Toutes <span class="tab-badge">${total}</span></div>`;
  }
  buvettes.forEach(b=>{
    const nb = getSessions(b.id).length;
    html += `<div class="buvette-tab ${activeBuvetteId===b.id?'active':''}" onclick="setActiveBuvette('${b.id}')">🏪 ${b.nom} <span class="tab-badge">${nb}</span><span class="tab-edit" onclick="event.stopPropagation();ouvrirModalBuvette('${b.id}')" title="Modifier / supprimer">⚙️</span></div>`;
  });
  html += `<button class="btn-add-buvette" onclick="ouvrirModalBuvette(null)" title="Ajouter une buvette">＋</button>`;
  bar.innerHTML = html;
}
function setActiveBuvette(id){
  activeBuvetteId=id; renderBuvetteTabs(); renderSessions();
  document.getElementById('rapportView').innerHTML='';
  document.getElementById('btnSave').style.display='none';document.getElementById('btnPrint').style.display='none';
}

// ─── MODAL BUVETTE ───
let _editingBuvetteId = null;
function ouvrirModalBuvette(id){
  _editingBuvetteId=id;
  const b=id?getBuvettes().find(x=>x.id===id):null;
  document.getElementById('buvetteModalTitle').textContent=b?'✏️ Renommer':'🏪 Nouvelle buvette';
  document.getElementById('buvetteModalInput').value=b?b.nom:'';
  document.getElementById('btnSupprimerBuvette').style.display=b?'block':'none';
  document.getElementById('buvetteModalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('buvetteModalInput').focus(),100);
}
function fermerModalBuvette(){ document.getElementById('buvetteModalOverlay').classList.remove('open'); _editingBuvetteId=null; }
function confirmerBuvette(){
  const nom=document.getElementById('buvetteModalInput').value.trim();
  if(!nom){ toast('Entre un nom','warn'); return; }
  let buvettes=getBuvettes();
  if(_editingBuvetteId){
    saveBuvettes(buvettes.map(b=>b.id===_editingBuvetteId?{...b,nom}:b));
    toast('✅ Buvette renommée');
  } else {
    const newB={id:'bv_'+Date.now(),nom};
    buvettes.push(newB); saveBuvettes(buvettes);
    activeBuvetteId=newB.id;
    toast('✅ "'+nom+'" ajoutée');
  }
  fermerModalBuvette(); renderBuvetteTabs(); renderSessions();
}
function supprimerBuvetteActive(){
  if(!_editingBuvetteId) return;
  const b=getBuvettes().find(x=>x.id===_editingBuvetteId);
  const nb=getSessions(_editingBuvetteId).length;
  if(!confirm('Supprimer "'+b?.nom+'" et ses '+nb+' rapport(s) ?')) return;
  storeDel(sessionKeyFor(_editingBuvetteId));
  saveBuvettes(getBuvettes().filter(x=>x.id!==_editingBuvetteId));
  activeBuvetteId='all'; fermerModalBuvette(); renderBuvetteTabs(); renderSessions();
  toast('Buvette supprimée','warn');
}

// ─── SESSIONS ───
function renderSessions(){
  renderBuvetteTabs();
  const sessions = getSessions_active();
  const zone=document.getElementById('sessionsZone');
  const list=document.getElementById('sessionList');
  const periodeZone=document.getElementById('periodeZone');
  const backupZone=document.getElementById('backupZone');
  if(!sessions.length){ zone.style.display='none'; periodeZone.style.display='none'; backupZone.style.display='none'; return; }
  zone.style.display='block'; backupZone.style.display='block';
  periodeZone.style.display=sessions.length>=2?'block':'none';
  const dates=sessions.map(s=>s.date).sort();
  document.getElementById('dateDebut').value=dates[0];
  document.getElementById('dateFin').value=dates[dates.length-1];
  document.getElementById('periodeInfo').textContent=sessions.length+' rapport(s) — du '+fmtDateShort(dates[0])+' au '+fmtDateShort(dates[dates.length-1]);
  list.innerHTML=[...sessions].sort((a,b)=>b.date.localeCompare(a.date)).map(s=>`
    <div class="session-chip" onclick="afficherSession('${s.date}','${s._buvetteId||''}')">
      <div>
        <div class="chip-date">📅 ${fmtDate(s.date)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">
          ${activeBuvetteId==='all'&&s._buvetteNom?'<span style="color:var(--gold);font-weight:600">'+s._buvetteNom+'</span> — ':''}${s.responsable||'—'}
        </div>
      </div>
      <span class="chip-ca">${fcfa(s.totalCA)}</span>
      <button class="chip-del" onclick="event.stopPropagation();supprimerSession('${s.date}','${s._buvetteId||''}')" title="Supprimer">✕</button>
    </div>`).join('');
}

// ── EXPORT GLOBAL ──
function exporterSessions(){
  const buvettes = getBuvettes();
  const allSessions = getSessions(null);
  if(!allSessions.length){ toast('Aucune donnée à exporter','warn'); return; }
  // Construire payload avec buvettes + leurs sessions
  const buvetteData = buvettes.map(b=>({
    id: b.id, nom: b.nom,
    sessions: getSessions(b.id)
  }));
  const payload = {
    version: 2,
    type: 'superviseur_backup_multi',
    exportedAt: new Date().toISOString(),
    buvettes: buvetteData,
    // Legacy sessions aussi
    legacySessions: (() => { try{ return JSON.parse(storeGet(DG_SESSIONS_KEY)||'[]'); }catch(e){return [];} })()
  };
  const json = JSON.stringify(payload);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  const blob = new Blob([b64], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `oncle-mouss-sauvegarde-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  toast('✅ ' + allSessions.length + ' rapport(s) exporté(s)');
}

function importerSauvegarde(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let data = null;
    const raw = e.target.result.trim();
    try{ data = JSON.parse(decodeURIComponent(escape(atob(raw.replace(/[\s\r\n]+/g,''))))); }catch(e1){}
    if(!data){ try{ data = JSON.parse(raw); }catch(e2){} }
    if(!data){ toast('Fichier invalide','err'); return; }

    // Format v2 multi-buvettes
    if(data.version===2 && data.buvettes){
      const nbBuvettes = data.buvettes.length;
      const nbSessions = data.buvettes.reduce((s,b)=>s+b.sessions.length,0);
      if(!confirm('Restaurer '+nbBuvettes+' buvette(s) et '+nbSessions+' rapport(s) ?\nCela remplacera toutes les données actuelles.')) return;
      saveBuvettes(data.buvettes.map(b=>({id:b.id,nom:b.nom})));
      data.buvettes.forEach(b=>saveSessionsFor(b.id, b.sessions));
      if(data.legacySessions?.length) storeSet(DG_SESSIONS_KEY, JSON.stringify(data.legacySessions));
      activeBuvetteId='all';
      renderSessions();
      document.getElementById('rapportView').innerHTML='';
      toast('✅ '+nbSessions+' rapport(s) dans '+nbBuvettes+' buvette(s) restauré(s)');
    }
    // Format v1 ancien (sessions flat)
    else if(data.sessions && Array.isArray(data.sessions)){
      const nb = data.sessions.length;
      if(!confirm('Restaurer '+nb+' rapport(s) ?')) return;
      storeSet(DG_SESSIONS_KEY, JSON.stringify(data.sessions));
      activeBuvetteId='all';
      renderSessions();
      document.getElementById('rapportView').innerHTML='';
      toast('✅ '+nb+' rapport(s) restauré(s)');
    } else {
      toast('Fichier de sauvegarde invalide','err');
    }
  };
  reader.readAsText(file);
  event.target.value='';
}

// ─── RACCOURCIS PÉRIODE ───
function raccourciPeriode(jours){
  const sessions = getSessions_active();
  if(!sessions.length) return;
  const dates = sessions.map(s=>s.date).sort();
  const fin = dates[dates.length-1];
  const dFin = new Date(fin+'T00:00:00');
  const dDeb = new Date(dFin);
  dDeb.setDate(dDeb.getDate() - (jours-1));
  document.getElementById('dateDebut').value = dDeb.toISOString().slice(0,10);
  document.getElementById('dateFin').value = fin;
  genererRapportPeriode();
}

function raccourciPeriodeMois(){
  const now = new Date();
  const premier = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const dernier = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);
  document.getElementById('dateDebut').value = premier;
  document.getElementById('dateFin').value = dernier;
  genererRapportPeriode();
}

function fmtDateShort(d){
  try{ return new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}); }
  catch(e){ return d; }
}

function genererRapportPeriode(){
  const deb = document.getElementById('dateDebut').value;
  const fin = document.getElementById('dateFin').value;
  if(!deb || !fin){ toast('Sélectionnez une date de début et de fin','warn'); return; }
  if(deb > fin){ toast('La date de début doit être avant la date de fin','err'); return; }
  const sessions = getSessions_active().filter(s => s.date >= deb && s.date <= fin);
  if(!sessions.length){ toast('Aucun rapport dans cette période','warn'); document.getElementById('rapportView').style.display='none'; return; }
  renderRapportPeriode(sessions, deb, fin);
}

// ─── RENDER RAPPORT PÉRIODE (agrégé) ───
function renderRapportPeriode(sessions, deb, fin){
  const view = document.getElementById('rapportView');
  view.style.display='block';

  // Tri chronologique
  sessions = [...sessions].sort((a,b)=>a.date.localeCompare(b.date));
  const nbJours = sessions.length;

  // ── AGRÉGATION ──
  let totalCA = 0, totalPertes = 0, totalApproCout = 0;
  let totalNbVentes = 0, totalNbCommandes = 0, totalImpaye = 0;
  const venduMap = {}, caMap = {}, boissonRef = {};
  const caParJour = []; // pour graphe évolution

  sessions.forEach(data => {
    totalCA       += data.totalCA||0;
    totalPertes   += data.totalPertes||0;
    totalApproCout+= data.totalApproCout||0;
    totalNbVentes += data.nbVentes||0;
    totalNbCommandes += data.nbCommandes||0;

    // impayés
    totalImpaye += (data.commandes||[]).filter(c=>c.estImpaye&&!c.regle).reduce((s,c)=>s+c.total,0)
      + (data.ventes||[]).filter(v=>/(impay|crédit|credit|dette|doit)/i.test(v.obs||'')).reduce((s,v)=>s+v.montant,0);

    // ventes par boisson
    (data.ventes||[]).forEach(v=>{
      venduMap[v.boissonId]=(venduMap[v.boissonId]||0)+v.qte;
      caMap[v.boissonId]=(caMap[v.boissonId]||0)+v.montant;
    });
    (data.commandes||[]).forEach(c=>c.items.forEach(i=>{
      venduMap[i.boissonId]=(venduMap[i.boissonId]||0)+i.qte;
      caMap[i.boissonId]=(caMap[i.boissonId]||0)+i.sous_total;
    }));

    // référentiel boissons
    (data.stockSnapshot||[]).forEach(b=>{ if(!boissonRef[b.id]) boissonRef[b.id]=b; });

    // CA par jour
    caParJour.push({ date: data.date, ca: data.totalCA||0 });
  });

  const margeTheo = totalCA - totalApproCout;
  const caJourMoyen = totalCA / nbJours;

  // Top ventes
  const sorted = Object.keys(venduMap)
    .map(id=>({ b: boissonRef[id]||{id,nom:id,emoji:''}, qte: venduMap[id], ca: caMap[id]||0 }))
    .sort((a,b_)=>b_.qte-a.qte);
  const maxQte = sorted[0]?.qte||1;

  // ── HTML ──
  let html = `
  <div class="rapport-header">
    <div class="rapport-meta">
      <div>
        <div class="rapport-title">📆 ${fmtDateShort(deb)} → ${fmtDateShort(fin)}</div>
        <div class="rapport-sub">Rapport de période · <strong style="color:var(--gold)">${nbJours} jour${nbJours>1?'s':''}</strong> analysé${nbJours>1?'s':''}</div>
      </div>
      <div style="font-size:11px;color:var(--muted);text-align:right;font-family:'Space Mono',monospace">Consolidé<br>confidentiel</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi-box">
        <div class="kv">CA Total période</div>
        <div class="kn" style="color:var(--green)">${fcfa(totalCA)}</div>
      </div>
      <div class="kpi-box">
        <div class="kv">Moy. / jour</div>
        <div class="kn" style="color:var(--gold)">${fcfa(caJourMoyen)}</div>
      </div>
      <div class="kpi-box">
        <div class="kv">Ventes totales</div>
        <div class="kn" style="color:var(--text)">${totalNbVentes+totalNbCommandes}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">${totalNbVentes} ind. · ${totalNbCommandes} cmd</div>
      </div>
      ${totalApproCout>0?`<div class="kpi-box">
        <div class="kv">Coût Appro</div>
        <div class="kn" style="color:var(--blue)">${fcfa(totalApproCout)}</div>
      </div>`:''}
      ${margeTheo>0?`<div class="kpi-box">
        <div class="kv">Marge théo.</div>
        <div class="kn" style="color:var(--purple)">${fcfa(margeTheo)}</div>
      </div>`:''}
      ${totalImpaye>0?`<div class="kpi-box">
        <div class="kv">⚠️ Impayés</div>
        <div class="kn" style="color:var(--red)">${fcfa(totalImpaye)}</div>
      </div>`:''}
      ${totalPertes>0?`<div class="kpi-box">
        <div class="kv">Pertes</div>
        <div class="kn" style="color:var(--red)">${fcfa(totalPertes)}</div>
      </div>`:''}
    </div>
  </div>`;

  // ── ÉVOLUTION CA PAR JOUR ──
  if(nbJours > 1){
    const maxCA = Math.max(...caParJour.map(x=>x.ca))||1;
    html+=`<div class="section">
      <div class="section-title">📈 Évolution du CA jour par jour</div>
      ${caParJour.map(x=>{
        const pct = (x.ca/maxCA*100).toFixed(0);
        const isMax = x.ca===maxCA;
        return `<div class="bar-row">
          <div class="bar-label" style="min-width:110px;font-size:12px">${fmtDateShort(x.date)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${isMax?'var(--green)':'var(--gold)'}"></div></div>
          <div class="bar-val">${fcfa(x.ca)}</div>
        </div>`;
      }).join('')}
      <div style="font-size:11px;color:var(--muted);margin-top:8px">
        🟢 Meilleur jour : <strong style="color:var(--green)">${fmtDateShort(caParJour.reduce((a,b_)=>b_.ca>a.ca?b_:a).date)}</strong>
        &nbsp;·&nbsp;
        🔴 Moins bon : <strong style="color:var(--red)">${fmtDateShort(caParJour.reduce((a,b_)=>b_.ca<a.ca?b_:a).date)}</strong>
      </div>
    </div>`;
  }

  // ── TOP VENTES PÉRIODE ──
  if(sorted.length){
    html+=`<div class="section">
      <div class="section-title">🏆 Top Ventes sur la Période</div>
      ${sorted.map(x=>`
        <div class="bar-row">
          <div class="bar-label">${x.b.emoji||''} ${x.b.nom}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(x.qte/maxQte*100).toFixed(0)}%"></div></div>
          <div class="bar-val">${x.qte} u · ${fcfa(x.ca)}</div>
        </div>`).join('')}
    </div>`;
  }

  // ── RÉCAPITULATIF PAR JOURNÉE ──
  html+=`<div class="section">
    <div class="section-title">📋 Récapitulatif par journée</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:var(--card)">
        <th style="padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">Date</th>
        <th style="padding:8px 10px;text-align:right;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">CA</th>
        <th style="padding:8px 10px;text-align:center;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">Ventes</th>
        <th style="padding:8px 10px;text-align:right;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">Appro</th>
        <th style="padding:8px 10px;text-align:right;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">Pertes</th>
      </tr></thead>
      <tbody>
        ${sessions.map(s=>{
          const imp = (s.commandes||[]).filter(c=>c.estImpaye&&!c.regle).reduce((a,c)=>a+c.total,0);
          return `<tr style="cursor:pointer" onclick="afficherSession('${s.date}')" title="Voir le détail">
            <td style="padding:8px 10px;border-bottom:1px solid var(--border)">
              <span style="color:var(--gold);font-weight:600">${fmtDateShort(s.date)}</span>
              <span style="font-size:11px;color:var(--muted);display:block">${s.responsable||'—'}</span>
            </td>
            <td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--green);font-family:'Space Mono',monospace;font-weight:700">${fcfa(s.totalCA||0)}</td>
            <td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;color:var(--text)">${(s.nbVentes||0)+(s.nbCommandes||0)}${imp>0?' <span style="color:var(--red);font-size:10px">⚠️</span>':''}</td>
            <td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--blue);font-size:12px">${s.totalApproCout>0?fcfa(s.totalApproCout):'—'}</td>
            <td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--red);font-size:12px">${s.totalPertes>0?fcfa(s.totalPertes):'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot><tr style="background:var(--card);font-weight:700">
        <td style="padding:10px;font-size:12px;color:var(--muted)">TOTAL (${nbJours}j)</td>
        <td style="padding:10px;text-align:right;color:var(--green);font-family:'Space Mono',monospace">${fcfa(totalCA)}</td>
        <td style="padding:10px;text-align:center;color:var(--text)">${totalNbVentes+totalNbCommandes}</td>
        <td style="padding:10px;text-align:right;color:var(--blue)">${totalApproCout>0?fcfa(totalApproCout):'—'}</td>
        <td style="padding:10px;text-align:right;color:var(--red)">${totalPertes>0?fcfa(totalPertes):'—'}</td>
      </tr></tfoot>
    </table></div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">💡 Cliquer sur une ligne pour voir le rapport détaillé de cette journée</div>
  </div>`;

  view.innerHTML = html;
  rapportActif = { _periode: true, deb, fin, nbJours, totalCA };
  document.getElementById('btnSave').style.display='block';document.getElementById('btnPrint').style.display='block';
  view.scrollIntoView({behavior:'smooth',block:'start'});
}

function afficherSession(date, buvetteId){
  const sessions = buvetteId ? getSessions(buvetteId) : getSessions_active();
  const s = sessions.find(x=>x.date===date);
  if(!s) return;
  renderRapport(s);
}

function supprimerSession(date, buvetteId){
  if(!confirm('Supprimer ce rapport ?')) return;
  if(buvetteId){
    const sessions = getSessions(buvetteId).filter(s=>s.date!==date);
    saveSessionsFor(buvetteId, sessions);
  } else {
    // Legacy
    try{
      const legacy = JSON.parse(storeGet(DG_SESSIONS_KEY)||'[]').filter(s=>s.date!==date);
      storeSet(DG_SESSIONS_KEY, JSON.stringify(legacy));
    }catch(e){}
  }
  renderSessions();
  document.getElementById('rapportView').innerHTML='';
  toast('Rapport supprimé');
}

// ─── IMPORT RAPPORT JOURNALIER ───
function _sauvegarderRapportData(data){
  const nom = data.nomBuvette||'Buvette';
  const buvetteId = getBuvetteIdByNom(nom);
  const sessions = getSessions(buvetteId).filter(s=>s.date!==data.date);
  sessions.push(data);
  saveSessionsFor(buvetteId, sessions);
  // Switcher vers la buvette importée
  activeBuvetteId = buvetteId;
}

function importerFichierJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const errEl = document.getElementById('codeErr');
  errEl.style.display = 'none';
  const reader = new FileReader();
  reader.onload = function(e){
    let data = null;
    const raw = e.target.result.replace(/[\s\r\n\t]+/g,'');
    try {
      const bin = atob(raw);
      const bytes = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      const json = new TextDecoder('utf-8').decode(bytes);
      data = JSON.parse(json);
    } catch(e1){}
    if(!data){ try { data = JSON.parse(e.target.result); } catch(e2){} }
    if(!data || !data.date || !data.nomBuvette){
      errEl.style.display = 'block';
      errEl.textContent = 'Fichier invalide ou corrompu.';
      return;
    }
    _sauvegarderRapportData(data);
    renderSessions();
    renderRapport(data);
    toast('✅ Rapport "'+data.nomBuvette+'" importé !');
  };
  reader.readAsText(file);
  event.target.value = '';
}

function importerCode(){
  const raw = document.getElementById('codeInput').value.replace(/[\s\r\n\t]+/g,'');
  const errEl = document.getElementById('codeErr');
  errEl.style.display='none';
  if(!raw){ errEl.style.display='block'; errEl.textContent='Veuillez coller un code.'; return; }
  let data = null;
  try { const bin=atob(raw);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);data=JSON.parse(new TextDecoder('utf-8').decode(bytes)); } catch(e1){}
  if(!data){ try{data=JSON.parse(decodeURIComponent(escape(atob(raw))));}catch(e2){} }
  if(!data){ try{data=JSON.parse(raw);}catch(e3){} }
  if(!data||!data.date||!data.nomBuvette){
    errEl.style.display='block'; errEl.textContent='Code invalide. Copiez TOUT le texte depuis la buvette.'; return;
  }
  _sauvegarderRapportData(data);
  document.getElementById('codeInput').value='';
  renderSessions(); renderRapport(data);
  toast('✅ Rapport "'+data.nomBuvette+'" importé !');
}


// ─── SAUVEGARDER / IMPRIMER ───
let rapportActif = null;

function sauvegarderRapport(){
  if(!rapportActif){ toast('Aucun rapport affiché','warn'); return; }
  if(rapportActif._periode){ toast('Le rapport de période est calculé automatiquement','warn'); return; }
  const data = rapportActif;
  const nom = data.nomBuvette || 'Buvette';
  const buvetteId = getBuvetteIdByNom(nom);
  const sessions = getSessions(buvetteId).filter(s=>s.date!==data.date);
  sessions.push(data);
  saveSessionsFor(buvetteId, sessions);
  activeBuvetteId = buvetteId;
  renderSessions();
  toast('✅ Rapport du '+fmtDateShort(data.date)+' sauvegardé dans "'+nom+'"');
}

// ─── RENDER RAPPORT ───

  const view = document.getElementById('rapportView');

  // KPIs
  const totalCA = data.totalCA||0;
  const totalPertes = data.totalPertes||0;

  const margeTheo = totalCA - totalApproCout;

  // Ventes par boisson
  const venduMap={}, caMap={};
  (data.ventes||[]).forEach(v=>{ venduMap[v.boissonId]=(venduMap[v.boissonId]||0)+v.qte; caMap[v.boissonId]=(caMap[v.boissonId]||0)+v.montant; });
  (data.commandes||[]).forEach(c=>c.items.forEach(i=>{ venduMap[i.boissonId]=(venduMap[i.boissonId]||0)+i.qte; caMap[i.boissonId]=(caMap[i.boissonId]||0)+i.sous_total; }));
  const totalImpaye = (data.commandes||[]).filter(c=>c.estImpaye&&!c.regle).reduce((s,c)=>s+c.total,0)
    +(data.ventes||[]).filter(v=>/(impay|crédit|credit|dette|doit)/i.test(v.obs||'')).reduce((s,v)=>s+v.montant,0);

  const boissonsRef = data.stockSnapshot||[];
  const sorted = boissonsRef.map(b=>({b, qte:venduMap[b.id]||0, ca:caMap[b.id]||0})).filter(x=>x.qte>0).sort((a,b_)=>b_.qte-a.qte);
  const maxQte = sorted[0]?.qte||1;

  let html = `
  <!-- EN-TÊTE -->
  <div class="rapport-header">
    <div class="rapport-meta">
      <div>
        <div class="rapport-title">📊 ${fmtDate(data.date)}</div>
        <div class="rapport-sub">🍺 ${data.nomBuvette} &nbsp;·&nbsp; Responsable : ${data.responsable||'—'}</div>
      </div>
      <div style="font-size:11px;color:var(--muted);text-align:right;font-family:'Space Mono',monospace">Rapport journalier<br>confidentiel</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi-box">
        <div class="kv">CA Total</div>
        <div class="kn" style="color:var(--green)">${fcfa(totalCA)}</div>
      </div>
      <div class="kpi-box">
        <div class="kv">Ventes</div>
        <div class="kn" style="color:var(--gold)">${(data.nbVentes||0)+(data.nbCommandes||0)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">${data.nbVentes||0} ind. · ${data.nbCommandes||0} cmd</div>
      </div>
      ${(()=>{ const cond=(data.appros||[]).reduce((s,a)=>s+a.items.reduce((ss,i)=>ss+i.nbCond,0),0); const unites=(data.appros||[]).reduce((s,a)=>s+a.items.reduce((ss,i)=>ss+i.qte,0),0); return cond>0?`<div class="kpi-box"><div class="kv">📦 Casiers Reçus</div><div class="kn" style="color:var(--purple)">${cond}</div><div style="font-size:10px;color:var(--muted);margin-top:3px">${unites} unités</div></div>`:''; })()}
      ${totalImpaye>0?`<div class="kpi-box">
        <div class="kv">⚠️ Impayés</div>
        <div class="kn" style="color:var(--red)">${fcfa(totalImpaye)}</div>
      </div>`:''}
      ${totalApproCout>0?`<div class="kpi-box">
        <div class="kv">Coût Appro</div>
        <div class="kn" style="color:var(--blue)">${fcfa(totalApproCout)}</div>
      </div>`:''}
      ${totalPertes>0?`<div class="kpi-box">
        <div class="kv">Pertes</div>
        <div class="kn" style="color:var(--red)">${fcfa(totalPertes)}</div>
      </div>`:''}
    </div>
  </div>`;

  // TOP VENTES
  if(sorted.length){
    html+=`<div class="section">
      <div class="section-title">🏆 Top Ventes du Jour</div>
      ${sorted.map(x=>`
        <div class="bar-row">
          <div class="bar-label">${x.b.emoji||''} ${x.b.nom}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(x.qte/maxQte*100).toFixed(0)}%"></div></div>
          <div class="bar-val">${x.qte} u · ${fcfa(x.ca)}</div>
        </div>`).join('')}
    </div>`;
  }

  // COMMANDES — totaux seulement
  if((data.commandes||[]).length){
    const totalCmd = (data.commandes||[]).reduce((s,cmd)=>s+cmd.total,0);
    const nbRegle = (data.commandes||[]).filter(c=>c.regle).length;
    const nbImpaye = (data.commandes||[]).filter(c=>!c.regle).length;
    html+=`<div class="section">
      <div class="section-title">🎫 Commandes Groupées</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px">
        <div class="kpi-box"><div class="kv">Nombre</div><div class="kn" style="color:var(--gold)">${data.commandes.length}</div></div>
        <div class="kpi-box"><div class="kv">CA Commandes</div><div class="kn" style="color:var(--green)">${fcfa(totalCmd)}</div></div>
        ${nbRegle>0?`<div class="kpi-box"><div class="kv">✅ Réglées</div><div class="kn" style="color:var(--green)">${nbRegle}</div></div>`:''}
        ${nbImpaye>0?`<div class="kpi-box"><div class="kv">⚠️ Impayées</div><div class="kn" style="color:var(--red)">${nbImpaye}</div></div>`:''}
      </div>
    </div>`;
  }

  // VENTES INDIVIDUELLES — totaux seulement
  if((data.ventes||[]).length){
    const totalVInd = (data.ventes||[]).reduce((s,v)=>s+v.montant,0);
    html+=`<div class="section">
      <div class="section-title">🛒 Ventes Individuelles</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px">
        <div class="kpi-box"><div class="kv">Nombre</div><div class="kn" style="color:var(--gold)">${data.ventes.length}</div></div>
        <div class="kpi-box"><div class="kv">CA Ventes Ind.</div><div class="kn" style="color:var(--green)">${fcfa(totalVInd)}</div></div>
      </div>
    </div>`;
  }

  // APPROS
  if((data.appros||[]).length){
    html+=`<div class="section">
      <div class="section-title">📥 Approvisionnements</div>
      ${data.appros.map(a=>{
        const cout=a.items.reduce((s,i)=>s+i.cout,0);
        return `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px">
          <div style="font-weight:600;margin-bottom:6px">${a.heure} — ${a.depot||'Dépôt'} ${a.numDepot?'('+a.numDepot+')':''}</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Réceptionnaire : ${a.recept||'—'}</div>
          <table class="tbl"><thead><tr><th>Boisson</th><th>Cond.</th><th>Unités</th><th style="text-align:right">Coût</th></tr></thead>
          <tbody>${a.items.map(i=>`<tr>
            <td>${i.emoji} ${i.nom}</td><td class="num">${i.nbCond}</td><td class="num">${i.qte}</td>
            <td class="num" style="text-align:right;color:var(--red)">${fcfa(i.cout)}</td>
          </tr>`).join('')}</tbody></table>
          <div style="text-align:right;font-weight:700;color:var(--red);margin-top:8px">Coût total : ${fcfa(cout)}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // PERTES
  if((data.pertes||[]).length){
    html+=`<div class="section">
      <div class="section-title">🗑️ Pertes</div>
      <table class="tbl"><thead><tr><th>Heure</th><th>Boisson</th><th>Qté</th><th>Raison</th><th style="text-align:right">Valeur perdue</th></tr></thead>
      <tbody>${data.pertes.map(p=>`<tr>
        <td class="num" style="color:var(--muted)">${p.heure}</td>
        <td>${p.emoji} ${p.nom}</td><td class="num">${p.qte}</td><td>${p.raison}</td>
        <td class="num" style="text-align:right;color:var(--red)">${fcfa(p.valeur)}</td>
      </tr>`).join('')}</tbody></table>
      <div style="text-align:right;font-weight:700;color:var(--red);margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">Total pertes : ${fcfa(totalPertes)}</div>
    </div>`;
  }

  // STOCK FIN DE JOURNÉE
  if((data.stockSnapshot||[]).length){
    const snap = data.stockSnapshot;
    const casierInfo = s => {
      if(!s.nbParCond||s.nbParCond<=1) return {btl: s.stock+' u', cas: '—'};
      const cas = Math.floor(s.stock/s.nbParCond);
      const rem = s.stock%s.nbParCond;
      return { btl: s.stock+' btl', cas: cas+' cas'+(rem>0?' +'+rem:'') };
    };
    const rowBg = (stock, nbParCond) => {
      if(stock===0) return '#ef444418';
      if(nbParCond>1 && stock<nbParCond) return '#f59e0b18';
      return 'transparent';
    };
    const rows = snap.map(s => {
      const info = casierInfo(s);
      const bg = rowBg(s.stock, s.nbParCond||1);
      const valeur = (s.stock*(s.prix||0)).toLocaleString('fr-FR');
      return '<tr style="background:'+bg+'">'
        +'<td style="padding:8px 10px;border-bottom:1px solid var(--border)">'+(s.emoji||'')+' '+s.nom+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;color:var(--muted2)">'+(s.type||'—')+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;color:var(--gold);font-weight:700">'+info.btl+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;color:var(--muted2)">'+info.cas+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--green);font-size:12px">'+valeur+' F</td>'
        +'</tr>';
    }).join('');
    const totalBtl = snap.reduce((s,b)=>s+b.stock,0);
    const totalVal = snap.reduce((s,b)=>s+(b.stock*(b.prix||0)),0);
    html+='<div class="section">'
      +'<div class="section-title">📦 Stock Fin de Journée</div>'
      +'<div style="overflow-x:auto">'
      +'<table style="width:100%;border-collapse:collapse;font-size:13px">'
      +'<thead><tr style="background:var(--card)">'
      +'<th style="padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">Produit</th>'
      +'<th style="padding:8px 10px;text-align:center;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">Type</th>'
      +'<th style="padding:8px 10px;text-align:center;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">Quantité</th>'
      +'<th style="padding:8px 10px;text-align:center;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">Casiers</th>'
      +'<th style="padding:8px 10px;text-align:right;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2)">Valeur</th>'
      +'</tr></thead>'
      +'<tbody>'+rows+'</tbody>'
      +'<tfoot><tr style="background:var(--card);font-weight:700">'
      +'<td colspan="2" style="padding:10px;font-size:12px;color:var(--muted)">TOTAL</td>'
      +'<td style="padding:10px;text-align:center;color:var(--gold)">'+totalBtl+' btl</td>'
      +'<td></td>'
      +'<td style="padding:10px;text-align:right;color:var(--green)">'+totalVal.toLocaleString('fr-FR')+' F</td>'
      +'</tr></tfoot>'
      +'</table></div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:8px">🔴 Rupture &nbsp;|&nbsp; 🟡 Moins d\'un casier</div>'
      +'</div>';
  }

  view.innerHTML = html;
  // Tracker pour sauvegarde
  rapportActif = data;
  document.getElementById('btnSave').style.display='block';document.getElementById('btnPrint').style.display='block';
  view.scrollIntoView({behavior:'smooth',block:'start'});
}

<script>
(function(){
  function mkIcon(size){
    const c=document.createElement('canvas');c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    const r=size*0.2;
    const grad=ctx.createLinearGradient(0,0,size,size);
    grad.addColorStop(0,'#1a73e8');
    grad.addColorStop(1,'#0d47a1');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.arcTo(size,0,size,size,r);ctx.arcTo(size,size,0,size,r);
    ctx.arcTo(0,size,0,0,r);ctx.arcTo(0,0,size,0,r);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(0,0,size,size*0.1);
    ctx.fillStyle='#0a0c10';
    ctx.font='900 '+Math.round(size*0.46)+'px system-ui,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('SV',size/2,size*0.47);
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.font='700 '+Math.round(size*0.09)+'px system-ui,sans-serif';
    ctx.fillText('SUPERVISEUR',size/2,size*0.83);
    return c.toDataURL('image/png');
  }

  window.addEventListener('load',function(){
    const ico192=mkIcon(192);
    const ico512=mkIcon(512);
    document.getElementById('pwa-icon-link').href=ico192;
    document.getElementById('favicon-link').href=mkIcon(32);

    // ── Manifest 100% autonome (icônes embarquées, aucun fichier externe) ──
    const manifest={
      name:'Superviseur',
      short_name:'Superviseur',
      description:'Application de supervision',
      start_url:'.',
      scope:'./',
      display:'standalone',
      background_color:'#0a0c10',
      theme_color:'#1a73e8',
      orientation:'any',
      icons:[
        {src:ico192,sizes:'192x192',type:'image/png',purpose:'any maskable'},
        {src:ico512,sizes:'512x512',type:'image/png',purpose:'any maskable'}
      ],
      categories:['productivity','utilities']
    };
    const manifestBlob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    document.getElementById('pwa-manifest-link').href=URL.createObjectURL(manifestBlob);

    let _dp=null;
    window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_dp=e;_showBtn();});
    window.addEventListener('appinstalled',()=>{const b=document.getElementById('_ib');if(b)b.remove();_dp=null;});

    // iOS Safari ne déclenche jamais beforeinstallprompt : bouton d'instructions manuel
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
    const isStandalone=window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
    if(isIOS && !isStandalone){ _showIOSBtn(); }

    // ── Service worker : vrai fichier externe (sw.js à côté de ce HTML) ──
    // Un blob: n'est pas autorisé par les navigateurs pour un script de service worker.
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js',{scope:'./'})
        .then(()=>console.log('[SW] OK'))
        .catch(err=>console.warn('[SW] non disponible (sw.js manquant à côté de index.html) — l\'app fonctionne quand même, seul le cache offline est désactivé.',err));
    }

    function _showBtn(){
      if(document.getElementById('_ib'))return;
      const b=document.createElement('div');b.id='_ib';
      b.style.cssText='position:fixed;bottom:20px;right:16px;z-index:99999;background:#1a73e8;color:#fff;border-radius:50px;padding:12px 20px;font-weight:900;font-size:14px;cursor:pointer;box-shadow:0 4px 20px rgba(26,115,232,.5);font-family:system-ui,sans-serif;';
      b.textContent='📲 INSTALLER';
      b.onclick=async()=>{if(!_dp)return;_dp.prompt();const {outcome}=await _dp.userChoice;if(outcome==='accepted')b.remove();_dp=null;};
      document.body.appendChild(b);
    }

    function _showIOSBtn(){
      if(document.getElementById('_ib'))return;
      const b=document.createElement('div');b.id='_ib';
      b.style.cssText='position:fixed;bottom:20px;right:16px;z-index:99999;background:#1a73e8;color:#fff;border-radius:50px;padding:12px 20px;font-weight:900;font-size:14px;cursor:pointer;box-shadow:0 4px 20px rgba(26,115,232,.5);font-family:system-ui,sans-serif;';
      b.textContent='📲 INSTALLER';
      b.onclick=()=>{
        if(document.getElementById('_iosb'))return;
